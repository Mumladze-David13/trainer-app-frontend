name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/trainer-app/frontend

            # Получить последние изменения
            git pull origin main

            # Пересобрать и перезапустить контейнер
            # CACHEBUST = git commit hash, сбрасывает кеш COPY . . без перескачивания образов
            docker compose build --build-arg CACHEBUST=$(git rev-parse HEAD) frontend
            docker compose up -d --force-recreate frontend